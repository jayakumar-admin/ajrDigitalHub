<button 
  (click)="onClick($event)"
  [disabled]="disabled() || loading() !== null"
  [class]="getButtonClasses()"
  class="group flex items-center justify-center gap-2 px-3.5 py-2.5 rounded font-mono text-[10px] font-black uppercase tracking-widest border transition-all duration-300 disabled:opacity-30 disabled:cursor-not-allowed select-none">
  
  @if (loading() === action()) {
    <span class="w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
    <span>PROCESSING...</span>
  } @else {
    <mat-icon class="!w-[14px] !h-[14px] !text-[14px] group-hover:scale-110 transition-transform">{{ getIcon() }}</mat-icon>
    <span>{{ getLabel() }}</span>
  }
</button>
