<div id="system-layout-wrapper" class="h-[calc(100vh-64px)] bg-app-bg text-app-text font-sans flex flex-col md:flex-row overflow-hidden relative">
  
  <!-- Tech HUD glowing ambient backdrops -->
  <div class="absolute -left-40 -top-40 w-96 h-96 rounded-full bg-cyan-500/5 blur-[120px] pointer-events-none"></div>
  <div class="absolute right-10 bottom-10 w-96 h-96 rounded-full bg-indigo-500/5 blur-[140px] pointer-events-none"></div>

  <!-- Cyberpunk Grid Overlay -->
  <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.005)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.005)_1px,transparent_1px)] bg-[size:24px_24px] pointer-events-none"></div>

  <!-- LEFT SIDEBAR -->
  <aside class="w-full md:w-64 border-r border-app-border bg-black/45 z-20 shrink-0 flex flex-col h-screen overflow-y-auto relative custom-scrollbar">
    <!-- Sidebar Brand -->
    <div class="p-6 border-b border-app-border flex flex-col gap-4 relative">
      <!-- Small corner dots -->
      <div class="absolute top-2 left-2 w-1 h-1 bg-cyan-500/55"></div>
      <div class="absolute top-2 right-2 w-1.5 h-1.5 border-r border-t border-app-border"></div>

      <div class="flex items-center gap-3">
        <span class="text-lg font-black tracking-widest text-cyan-400 font-mono">SYS_ARCH</span>
      </div>
      
      <div class="border-l border-cyan-500/40 pl-3.5 py-1 flex flex-col">
        <span class="text-[9px] font-mono font-bold text-app-muted tracking-wider">NODE_01</span>
        <span class="text-[10px] font-mono font-black text-emerald-400 tracking-wide uppercase flex items-center gap-1.5 mt-0.5">
          <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_6px_rgba(52,211,153,0.5)]"></span>
          STATUS: OPERATIONAL
        </span>
      </div>
    </div>

    <!-- Navigation Links -->
    <nav class="p-4 flex-grow space-y-1 relative">
      <div class="text-[9px] font-mono font-bold text-app-muted uppercase tracking-widest px-3.5 mb-2.5">CORE SYSTEMS</div>
      
      @for (item of navItems; track item.label) {
        <button 
          (click)="navigate(item.route, item.label)"
          [class]="isActive(item.route) 
            ? 'bg-cyan-500/10 text-cyan-400 font-bold border border-cyan-500/25 shadow-[0_0_12px_rgba(6,182,212,0.15)]' 
            : 'text-app-muted hover:bg-app-bg/50 hover:text-app-text border border-transparent'" 
          class="w-full flex items-center justify-between px-3.5 py-2.5 rounded font-mono text-[11px] font-black uppercase tracking-wider transition-all duration-300">
          
          <span class="flex items-center gap-3">
            <mat-icon class="!w-[16px] !h-[16px] !text-[16px]" [class]="isActive(item.route) ? 'text-cyan-400' : 'text-app-muted'">{{ item.icon }}</mat-icon>
            {{ item.label }}
          </span>
          
          @if (item.label === 'SYSTEM CORE_MONITOR') {
            <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_6px_rgba(6,182,212,0.7)]"></span>
          }
        </button>
      }

      <!-- DevOps Quick Action -->
      <div class="pt-6 border-t border-app-border mt-6">
        <button 
          (click)="deployNewApp()"
          class="w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-mono text-[11px] font-black uppercase tracking-widest py-3 rounded shadow-lg shadow-cyan-400/15 hover:shadow-cyan-400/35 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-1.5">
          <mat-icon class="!w-[16px] !h-[16px] !text-[16px] shrink-0 font-black">rocket_launch</mat-icon>
          DEPLOY NEW APP
        </button>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-app-border bg-black/60 z-10">
      <div class="space-y-1.5">
        <button (click)="openDoc()" class="w-full text-left font-mono text-[9px] font-bold text-app-muted hover:text-app-text transition px-3 py-1 flex items-center gap-2">
          <mat-icon class="!w-[12px] !h-[12px] !text-[12px]">menu_book</mat-icon> DOCUMENTATION
        </button>
        <button (click)="openSupport()" class="w-full text-left font-mono text-[9px] font-bold text-app-muted hover:text-app-text transition px-3 py-1 flex items-center gap-2">
          <mat-icon class="!w-[12px] !h-[12px] !text-[12px]">support_agent</mat-icon> HUB SUPPORT
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN FRAMEWORK -->
  <div class="flex-grow flex flex-col h-screen overflow-hidden relative z-10 bg-black/10">
    
    <!-- HEADER -->
    <header class="h-16 border-b border-app-border bg-black/35 backdrop-blur-md px-6 md:px-8 flex items-center justify-between shrink-0 select-none">
      <!-- Left side Query -->
      <div class="flex items-center gap-4 flex-grow max-w-md">
        <span class="text-xs font-black tracking-widest text-cyan-400 font-mono flex items-center gap-1.5 shrink-0">
          SYS_ARCH_ADMIN
        </span>
        <div class="w-px h-5 bg-app-card"></div>
        <!-- Global search -->
        <div class="relative flex-grow">
          <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 !w-[16px] !h-[16px] !text-[16px] text-app-muted">search</mat-icon>
          <input 
            type="text" 
            placeholder="QUERY_SYSTEM..." 
            class="w-full bg-black/45 border border-app-border focus:border-cyan-500/40 rounded px-3 pl-9 py-1.5 text-xs font-mono text-app-text focus:outline-none placeholder-slate-700 tracking-wider">
        </div>
      </div>

      <!-- Right side Operations -->
      <div class="flex items-center gap-5 font-mono">
        <!-- Global Ping -->
        <div class="hidden sm:flex items-center gap-1.5 bg-emerald-500/5 border border-emerald-500/20 rounded px-2.5 py-1 text-[10px] font-bold text-emerald-400">
          <mat-icon class="!w-3 !h-3 !text-[12px] animate-pulse">wifi_tethering</mat-icon>
          BRIDGE_ESTABLISHED
        </div>

        <!-- Profile Info -->
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg border border-app-border bg-app-card overflow-hidden shrink-0 flex items-center justify-center">
            <mat-icon class="text-app-muted">account_circle</mat-icon>
          </div>
          <div class="hidden md:flex flex-col">
            <span class="text-[10px] font-black text-app-text">MASTER ADMIN</span>
            <span class="text-[8px] font-mono text-app-muted">ROOT_ACCESS</span>
          </div>
        </div>
      </div>
    </header>

    <!-- CANVAS BODY -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto scroll-smooth custom-scrollbar">
      <div class="max-w-[1400px] mx-auto space-y-8">
        <ng-content></ng-content>
      </div>
    </main>
    
  </div>
  
   <!-- Toast Notifications -->
  @if (store.toast().visible) {
    <div id="tech-toast" class="fixed bottom-6 right-6 z-50 flex items-center gap-3.5 px-4_5 py-3 border rounded shadow-2xl transition-all duration-300 animate-in fade-in slide-in-from-bottom-5 font-mono uppercase text-[10px] bg-app-bg/95 text-app-text"
         [class]="store.toast().type === 'success' ? 'border-emerald-500/40 shadow-emerald-500/10' : store.toast().type === 'error' ? 'border-rose-500/40 shadow-rose-500/10' : 'border-cyan-500/40 shadow-cyan-500/10'">
      <div class="w-1.5 h-1.5 rounded-full animate-ping" [class]="store.toast().type === 'success' ? 'bg-emerald-400' : store.toast().type === 'error' ? 'bg-rose-400' : 'bg-cyan-400'"></div>
      <span class="font-bold tracking-widest">{{ store.toast().message }}</span>
    </div>
  }
</div>
