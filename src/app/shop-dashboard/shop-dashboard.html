<div class="flex h-[calc(100vh-64px)] bg-gray-50 dark:bg-zinc-900">
  <!-- Sidebar -->
  <aside class="w-64 bg-white dark:bg-zinc-800 border-r border-gray-200 dark:border-white/10 flex flex-col">
    <div class="p-6">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white flex items-center gap-2">
        <mat-icon class="text-indigo-600 dark:text-indigo-400">storefront</mat-icon>
        Shop Dashboard
      </h2>
    </div>
    <nav class="flex-1 px-4 space-y-2">
      <a routerLink="/shop-dashboard" routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
        <mat-icon>dashboard</mat-icon>
        Overview
      </a>
      <a routerLink="/shop-dashboard/invoices" routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
        <mat-icon>receipt_long</mat-icon>
        Invoices
      </a>
      <a routerLink="/shop-dashboard/products" routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
        <mat-icon>inventory_2</mat-icon>
        Products
      </a>
      <a routerLink="/shop-dashboard/customers" routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
        <mat-icon>people</mat-icon>
        Customers
      </a>
      <a routerLink="/shop-dashboard/settings" routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
        <mat-icon>settings</mat-icon>
        Settings
      </a>
    </nav>
    <div class="p-4 border-t border-gray-200 dark:border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold">
          {{ authService.user()?.email?.charAt(0)?.toUpperCase() || 'U' }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 dark:text-white truncate">{{ authService.user()?.email }}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 truncate">Pro Plan</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 overflow-y-auto p-8">
    <router-outlet></router-outlet>
  </main>
</div>
