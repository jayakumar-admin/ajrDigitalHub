<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Customers</h1>
    <button class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600">
      <mat-icon class="text-sm">add</mat-icon>
      Add Customer
    </button>
  </div>

  <!-- Customer List -->
  <div class="bg-white dark:bg-zinc-800 shadow overflow-hidden sm:rounded-md">
    <ul role="list" class="divide-y divide-gray-200 dark:divide-white/10">
      @for (customer of customers(); track customer.id) {
        <li>
          <div class="px-4 py-4 sm:px-6 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
            <div class="flex items-center min-w-0 gap-4">
              <div class="h-10 w-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold">
                {{ customer.initial }}
              </div>
              <div>
                <p class="text-sm font-medium text-indigo-600 dark:text-indigo-400 truncate">{{ customer.name }}</p>
                <p class="text-sm text-gray-500 dark:text-gray-400 truncate">{{ customer.email }}</p>
              </div>
            </div>
            <div class="flex items-center gap-4">
              <button class="text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400">
                <mat-icon>edit</mat-icon>
              </button>
              <button class="text-gray-400 hover:text-red-600 dark:hover:text-red-400">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
        </li>
      }
      @if (customers().length === 0) {
        <li class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">No customers found. Add your first customer!</li>
      }
    </ul>
  </div>
</div>
