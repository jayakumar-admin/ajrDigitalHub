<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Products</h1>
    <button class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600">
      <mat-icon class="text-sm">add</mat-icon>
      Add Product
    </button>
  </div>

  <!-- Product List -->
  <div class="bg-white dark:bg-zinc-800 shadow overflow-hidden sm:rounded-md">
    <ul role="list" class="divide-y divide-gray-200 dark:divide-white/10">
      @for (product of products(); track product.id) {
        <li>
          <div class="px-4 py-4 sm:px-6 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-indigo-600 dark:text-indigo-400 truncate">{{ product.name }}</p>
              <p class="text-sm text-gray-500 dark:text-gray-400 truncate">{{ product.description }}</p>
            </div>
            <div class="flex items-center gap-4">
              <p class="text-sm font-medium text-gray-900 dark:text-white">{{ product.price | currency:'INR':'symbol':'1.0-0' }}</p>
              <button class="text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400">
                <mat-icon>edit</mat-icon>
              </button>
              <button class="text-gray-400 hover:text-red-600 dark:hover:text-red-400">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
        </li>
      }
      @if (products().length === 0) {
        <li class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">No products found. Add your first product!</li>
      }
    </ul>
  </div>
</div>
