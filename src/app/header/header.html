<header class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-200 dark:border-white/10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white shadow-lg shadow-primary/20">
          <mat-icon>hub</mat-icon>
        </div>
        <span class="text-xl font-display font-bold tracking-tight dark:text-white">AJR Digital <span class="text-primary">HUB</span></span>
      </div>

      <nav class="hidden md:flex items-center gap-8">
        <a routerLink="/" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Home</a>
        <a routerLink="/themes" routerLinkActive="text-primary" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Themes</a>
        <a routerLink="/invoice-saas" routerLinkActive="text-primary" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Invoice SaaS</a>
        <a routerLink="/ai-generator" routerLinkActive="text-primary" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">AI Generator</a>
        <a routerLink="/cart" routerLinkActive="text-primary" class="relative text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
          Cart
          @if (cartService.totalCount() > 0) {
            <span class="absolute -top-2 -right-4 bg-accent text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center animate-bounce">
              {{ cartService.totalCount() }}
            </span>
          }
        </a>
        @if (auth.user()) {
          <a routerLink="/my-orders" routerLinkActive="text-primary" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">My Orders</a>
        }
        @if (auth.isAdmin()) {
          <a routerLink="/admin" routerLinkActive="text-primary" class="text-sm font-bold text-primary hover:text-primary-dark transition-colors flex items-center gap-1">
            <mat-icon class="!text-sm">admin_panel_settings</mat-icon>
            Admin
          </a>
        }
      </nav>

      <div class="flex items-center gap-4">
        <button (click)="darkMode.toggle()" class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-all">
          <mat-icon>{{ darkMode.darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        @if (!auth.user()) {
          <button routerLink="/login" class="hidden sm:block text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary">Login</button>
        }
        <button routerLink="/themes" class="hidden sm:block btn-primary !py-2 !px-4 !text-sm">Get Started</button>
        <button class="md:hidden p-2 text-slate-600 dark:text-slate-400">
          <mat-icon>menu</mat-icon>
        </button>
      </div>
    </div>
  </div>
</header>
