<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center space-y-8">
    <div class="w-20 h-20 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto">
      <mat-icon class="text-primary text-4xl h-10 w-10">lock</mat-icon>
    </div>
    <div class="space-y-2">
      <h1 class="text-2xl font-bold text-slate-900">Admin Login</h1>
      <p class="text-slate-500">Sign in to access the AJR Digital HUB dashboard</p>
    </div>
    
    <button (click)="login()" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm active:scale-[0.98]">
      <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
      Sign in with Google
    </button>
    
    <p class="text-xs text-slate-400">
      Only authorized administrators can access this area.
    </p>
  </div>
</div>
